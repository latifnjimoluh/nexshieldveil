name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (headless, no camera/display)
    runs-on: ${{ matrix.os }}
    # Use bash on every OS (incl. Windows) so multi-line `\` run steps parse
    # consistently; the default Windows shell (PowerShell) treats `\` differently.
    defaults:
      run:
        shell: bash
    env:
      # UI tests run fully headless via Qt's offscreen platform (no display, no camera).
      QT_QPA_PLATFORM: offscreen
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Linux Qt offscreen libraries (for the headless UI tests)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install (core + dev + UI; PySide6 for headless QML/view-model tests)
        run: |
          # Refresh build tooling too: the runner ships an old setuptools whose
          # deprecated package_index has known CVEs and would trip pip-audit.
          # The [ui] extra (PySide6) is needed for the offscreen UI tests; no camera
          # (vision) extra is installed, so the suite stays hardware-free.
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev,ui]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy (core modules)
        run: mypy src/privacy_guard/config src/privacy_guard/geometry src/privacy_guard/tracking src/privacy_guard/policy src/privacy_guard/masking

      - name: Bandit (security lint)
        run: bandit -r src -ll

      - name: pip-audit (dependency CVEs)
        # Audits the CI venv: this project's runtime + dev deps (all version-bounded)
        # plus the refreshed build tooling. --skip-editable skips THIS project itself
        # (installed via `pip install -e .`): it isn't published on PyPI, so a strict
        # audit would otherwise abort with "could not be audited". We audit our
        # dependencies, not our own (un-published) package.
        run: pip-audit --strict --desc --skip-editable

      - name: Tests (exclude slow/hardware), with coverage
        run: |
          pytest -m "not slow and not requires_hardware" \
            --cov=privacy_guard --cov-report=term-missing --cov-report=xml

      - name: Privacy guarantees (no network / no frame persistence)
        run: pytest -m privacy -v

      - name: Performance benchmarks
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: pytest -m performance -v
